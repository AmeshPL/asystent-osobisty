<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Asystent</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f1115" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="pinOverlay">
    <div id="pinBox">
      <p>Podaj PIN dostepu</p>
      <input id="pinInput" type="password" inputmode="numeric" autocomplete="off" />
      <button id="pinSubmit">Zatwierdz</button>
      <p id="pinError" hidden>Nieprawidlowy PIN, sprobuj ponownie.</p>
    </div>
  </div>

  <button id="menuBtn" aria-label="Historia rozmow">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/></svg>
  </button>

  <div id="historyBackdrop" hidden></div>
  <aside id="historyDrawer">
    <div id="historyHeader">
      <span>Historia rozmow</span>
      <button id="historyClose" aria-label="Zamknij">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M18.3 5.71 12 12l6.3 6.29-1.41 1.42L10.59 13.4 4.3 19.7 2.89 18.3 9.17 12 2.89 5.71 4.3 4.3l6.29 6.3 6.3-6.3z"/></svg>
      </button>
    </div>
    <div id="historyList"></div>
  </aside>

  <main>
    <h1>Asystent</h1>
    <p id="status">Stuknij, zeby zaczac rozmowe</p>

    <div id="ringWrap">
      <span class="ring r1"></span>
      <span class="ring r2"></span>
      <button id="talkBtn" aria-label="Mow">
        <svg viewBox="0 0 24 24" width="36" height="36" fill="currentColor">
          <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3z"/>
          <path d="M19 11a1 1 0 0 0-2 0 5 5 0 0 1-10 0 1 1 0 0 0-2 0 7 7 0 0 0 6 6.92V20H9a1 1 0 0 0 0 2h6a1 1 0 0 0 0-2h-2v-2.08A7 7 0 0 0 19 11z"/>
        </svg>
      </button>
    </div>

    <div id="waveform" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <button id="resetBtn">Nowa rozmowa</button>

    <a id="googleBanner" href="/auth/google" hidden>Polacz konto Google (zadania, kalendarz, poczta)</a>

    <div id="log"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
